# Temporal GNN on toy dataset configuration

model:
  name: TemporalGNN
  in_channels: 8
  hidden_channels: 32
  out_channels: 8
  num_layers: 2
  dropout: 0.1

data:
  dataset: ToyTemporal
  root: ./data
  num_nodes: 50
  num_timesteps: 20
  num_features: 8

training:
  epochs: 100
  optimizer: adam
  lr: 5.0e-3
  weight_decay: 1.0e-4

logging:
  log_interval: 10
  save_dir: ./results/temporal_gnn_toy
